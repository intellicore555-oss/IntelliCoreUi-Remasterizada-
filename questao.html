  <button onclick="enviar()">Enviar</button>
</div>

<script>
async function enviar() {
  const respostas = [];
  const textos = document.querySelectorAll("textarea");

  let respondeuAlgo = false;
  let i = 0;

  for (let t of textos) {
    const valor = t.value.trim();

    if (valor) respondeuAlgo = true;

    respostas.push({
      pergunta: i + 1,
      resposta: valor || null
    });

    i++;
  }

  if (!respondeuAlgo) {
    alert("Responda pelo menos uma pergunta 😅");
    return;
  }

  try {
    const res = await fetch("https://mulher-amparada.vercel.app/api/respostas", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(respostas)
    });

    const data = await res.json();
    console.log(data);

    alert("Enviado 💖");

  } catch (err) {
    console.error(err);
    alert("Erro ao enviar ❌");
  }
}
</script>
