<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;700&display=swap" rel="stylesheet">

<title>Home</title>

<style>

* {
  font-family: 'Quicksand', sans-serif;
}

body {
  background: black;
  margin: 0;
}

/* 🔥 UI */
.mainUI {
  min-height: 100vh;
  overflow-y: auto;
  text-align: center;
}

/* 🔻 Toggle (NUNCA some) */
.toggle {
  width: 60%;
  height: 55px;
  border: 2px solid #E6A8D7;
  border-radius: 80px;
  padding: 5px;

  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);

  display: flex;
  align-items: center;
  z-index: 999;

  /* 🔥 importante */
  overflow: hidden;
  background: violet;
}

/* 🌊 camada da onda */
.toggle::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  top: -60%;
  left: -50%;

  background: radial-gradient(circle at 50% 50%, skyblue , transparent 60%);

  animation: waveMove 1s linear infinite;
  z-index: -1;
}

/* 🌊 animação */
@keyframes waveMove {
  0% {
    transform: scale(1);
  }
  50% {
    transform: scale(2);
  }
  100% {
    transform: scale(1);
  }
}

.alavanca {
  background: #E6A8D7;
  width: 50%;
  height: 100%;
  border-radius: 80px;

  display: flex;
  justify-content: center;
  align-items: center;

  transition: transform 0.3s ease;
}

svg {
  width: 32px;
  height: 32px;
}

.icon2 {
  display: none;
}

/* 🔥 animações */
@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.9); }
  to   { opacity: 1; transform: scale(1); }
}

@keyframes fadeOut {
  from { opacity: 1; }
  to   { opacity: 0; }
}

@keyframes pulse {
  0% { transform: scale(0.85); }
  50% { transform: scale(1); }
  100% { transform: scale(0.85); }
}

/* 🔴 SOS FIXO (NUNCA desalinha) */
.panic {
  position: relative;
  
  background: red;
  color: white;
  font-size: 28px;
  width: 260px;
  height: 140px;
  border-radius: 500px;
  border: none;

  opacity: 0;
  pointer-events: none;
}

.panic.ativo {
  opacity: 1;
  pointer-events: auto;
  animation: fadeIn 0.4s ease;
  }

/* botões */
.btn, .local {
  display: block;
  width: 250px;
  margin: 10px auto;
  padding: 15px;
  font-size: 18px;
  border: none;
  border-radius: 100px;
  color: white;
}

.policia { background: #1e90ff; }
.samu { background: orange; }
.mulher { background: #ff69b4; }
.zap { background: #25d366; }
.local { background: #0ABAB5; }

.info {
  background: pink;
  width: 60%;
  margin: 20px auto;
  padding: 20px;
  border-radius: 20px;
  position: relative;
  
}

.leftUI, .rightUI {
  transition: 0.3s;
}

/* começa mostrando esquerda */
.rightUI {
  display: none;
  position: absolute;
  top: 8%;
  left: 0;
  width: 100%;
}

.button {
  background: pink;
  color: black;
  padding: 12px;
  border-radius: 30px;
  border: 2px solid pink;
  margin: 10px 0;
  margin-top: 0;
    font-size: 15px;
  width: 75%;
  position: relative;  
}

/* BOTÕES */
/* BOTÕES TOGGLES */
.toggles {
  width: 65%;
  height: 30px;

  margin: 10px auto; /* 🔥 centraliza */

  border-radius: 300px;
  display: flex;
  align-items: center;
  padding: 12px 16px;

  color: black;
  font-weight: 500;

  cursor: pointer;
  transition: transform 0.15s ease, opacity 0.15s ease;
  background: mediumslateblue;
}

/* cores */
/* texto */
.toggles h3 {
  margin: 0;
  font-size: 16px;

  white-space: nowrap;
  overflow-x: auto;
  max-width: 100%;
}

/* efeito ao clicar */
.toggles:active {
  transform: scale(0.97);
  opacity: 0.85;
}
</style>
</head>

<body>

<div class="mainUI">

<br><br>

<button class="panic">SOS</button>



<!-- ESQUERDA -->
<div class="leftUI">

  <button class="btn policia" onclick="ligar('190')">🚔 Polícia (190)</button>
  <button class="btn samu" onclick="ligar('192')">🚑 SAMU (192)</button>
  <button class="btn mulher" onclick="ligar('180')">☎️ Mulher (180)</button>
  <button class="btn zap" onclick="whatsapp180()">💬 WhatsApp 180</button>

  <button onclick="enviarLocalizacao()" class="local">
    📍 Enviar localização
  </button>
  
    
<div class="toggles" onclick="window.location.href='treino.html'">
  <h3>Checklist</h3>
</div>

<div class="toggles" onclick="window.location.href='calendario.html'">
  <h3>Calendário menstrual</h3>
</div>

<div class="toggles" onclick="window.location.href='caderno.html'">
  <h3>Diário</h3>
</div>

<br><br><br><br><br>

</div>

<!-- DIREITA -->
<div class="rightUI">

  <div class="info">
 <h3>📌 Para que serve:</h3>

    <p><b>190 - Polícia</b><br>
    Emergências como assalto, perigo imediato ou violência.</p>

    <p><b>192 - SAMU</b><br>
    Emergências médicas, acidentes ou pessoas passando mal.</p>

    <p><b>180 - Central da Mulher</b><br>
    Denúncias e apoio em casos de violência contra a mulher.</p>
  </div>

</div>

<!-- 🔻 TOGGLE -->
<div class="toggle" id="puxador">
  <div class="alavanca" id="puxar">

    <svg class="icon1" width="64px" height="64px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"><path clip-rule="evenodd" d="m12 3.75c-4.55635 0-8.25 3.69365-8.25 8.25 0 4.5563 3.69365 8.25 8.25 8.25 4.5563 0 8.25-3.6937 8.25-8.25 0-4.55635-3.6937-8.25-8.25-8.25zm-9.75 8.25c0-5.38478 4.36522-9.75 9.75-9.75 5.3848 0 9.75 4.36522 9.75 9.75 0 5.3848-4.3652 9.75-9.75 9.75-5.38478 0-9.75-4.3652-9.75-9.75zm9.75-4.25c.4142 0 .75.33579.75.75v3.5c0 .4142-.3358.75-.75.75s-.75-.3358-.75-.75v-3.5c0-.41421.3358-.75.75-.75zm0 6.25c-.5523 0-1 .4477-1 1s.4477 1 1 1h.01c.5523 0 1-.4477 1-1s-.4477-1-1-1z" fill="#ff0000" fill-rule="evenodd"></path></g></svg>

<svg class="icon2" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M13 3H8.2C7.0799 3 6.51984 3 6.09202 3.21799C5.71569 3.40973 5.40973 3.71569 5.21799 4.09202C5 4.51984 5 5.0799 5 6.2V17.8C5 18.9201 5 19.4802 5.21799 19.908C5.40973 20.2843 5.71569 20.5903 6.09202 20.782C6.51984 21 7.0799 21 8.2 21H15.8C16.9201 21 17.4802 21 17.908 20.782C18.2843 20.5903 18.5903 20.2843 18.782 19.908C19 19.4802 19 18.9201 19 17.8V9M13 3L19 9M13 3V7.4C13 7.96005 13 8.24008 13.109 8.45399C13.2049 8.64215 13.3578 8.79513 13.546 8.89101C13.7599 9 14.0399 9 14.6 9H19M8.12695 21C8.571 19.2748 10.1371 18 12.0009 18C13.8648 18 15.4309 19.2748 15.8749 21M13 14C13 14.5523 12.5523 15 12 15C11.4477 15 11 14.5523 11 14C11 13.4477 11.4477 13 12 13C12.5523 13 13 13.4477 13 14Z" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> </g></svg>

  </div>
</div>

<script>
const toggle = document.getElementById("puxador");
const alavanca = document.getElementById("puxar");

const icon1 = document.querySelector(".icon1");
const icon2 = document.querySelector(".icon2");

const leftUI = document.querySelector(".leftUI");
const rightUI = document.querySelector(".rightUI");

const panic = document.querySelector(".panic");

let ligado = false;

// 🔥 estado inicial (mostra SOS)
panic.classList.add("ativo");

toggle.addEventListener("click", function() {
  ligado = !ligado;

  // 🔻 move alavanca
  alavanca.style.transform = ligado
    ? "translateX(100%)"
    : "translateX(0)";

  // 🔻 troca ícones
  icon1.style.display = ligado ? "none" : "block";
  icon2.style.display = ligado ? "block" : "none";

  if (ligado) {
    // 👉 ESQUERDA → DIREITA (INFO)

    // 🔴 esconde SOS
    panic.classList.remove("ativo");
    

    // 🔥 anima saída
    leftUI.style.animation = "fadeOut 0.3s forwards";

    setTimeout(() => {
      leftUI.style.display = "none";

      // 🔥 mostra info
      rightUI.style.display = "block";
      rightUI.style.animation = "fadeIn 0.4s ease";
    }, 300);

  } else {
    // 👉 DIREITA → ESQUERDA (BOTÕES)
    // 🔥 anima saída
    rightUI.style.animation = "fadeOut 0.3s forwards";

    setTimeout(() => {
      rightUI.style.display = "none";

      // 🔥 volta botões
      leftUI.style.display = "block";
      leftUI.style.animation = "fadeIn 0.4s ease";

      // 🔴 mostra SOS de novo
      panic.classList.add("ativo");
      
    }, 300);
  }
});


// ================= FUNÇÕES =================

// 📞 LIGAÇÃO
function ligar(numero) {
  window.location.href = "tel:" + numero;
}

// 💬 WHATSAPP
function whatsapp180() {
  window.location.href = "https://wa.me/556196100180";
}

// 📍 LOCALIZAÇÃO
function enviarLocalizacao() {
  if (!navigator.geolocation) {
    alert("Geolocalização não suportada");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function (pos) {
      const link = `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;

      window.location.href =
        "https://wa.me/556196100180?text=" +
        encodeURIComponent("🚨 SOCORRO! Estou aqui: " + link);
    },
    function () {
      alert("Não foi possível obter localização");
    }
  );
}
</script>

<script>
// pega o elemento
const botao = document.querySelector('.panic');

botao.addEventListener('click', function () {

    if (window.Android && Android.ligarDireto) {
        Android.ligarDireto('180');
    } else {    
        alert("Função disponível apenas no app android IntelliCoreUi Remasterizada!");
    }

});

</script>

</body>
</html>
